[app:main]
use = egg:kinto

kinto.userid_hmac_secret = b4c96a8d91846eb4692291d88fe5a97d
kinto.paginate_by = 5

kinto.includes = kinto.plugins.flush
                 kinto.plugins.accounts
                 kinto_attachment

multiauth.policies = account
multiauth.policy.account.use = kinto.plugins.accounts.AccountsPolicy
kinto.account_create_principals = system.Everyone
kinto.account_write_principals = account:user
kinto.bucket_create_principals = account:user

kinto.attachment.base_path = /tmp

kinto.experimental_permissions_endpoint = true

[server:main]
use = egg:waitress#main
host = 0.0.0.0
port = 8888

[loggers]
keys = root, kinto

[handlers]
keys = console

[formatters]
keys = color

[logger_root]
level = INFO
handlers = console

[logger_kinto]
level = DEBUG
handlers = console
qualname = kinto

[handler_console]
class = kinto.core.StreamHandlerWithRequestID
args = (sys.stderr,)
level = NOTSET
formatter = color

[formatter_color]
class = logging_color_formatter.ColorFormatter
